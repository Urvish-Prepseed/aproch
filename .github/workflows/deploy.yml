name: Deploy Next.js to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          printf '%s' "$APP_ENV" > .env.production
          export NODE_ENV=production
          npm run build
          rm -f .env.production

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude "/node_modules" \
            -e "ssh -i ~/.ssh/ec2.pem" \
            ./ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/nextjs-app2

      - name: Setup ENV & Restart App
        run: |
          ssh -i ~/.ssh/ec2.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /var/www/nextjs-app2

            echo "${{ secrets.APP_ENV }}" > .env

            # Install production dependencies on the EC2 instance
            npm ci --omit=dev

            # Start Next.js via Webpack output (default)
            pm2 delete nextjs-app2 2>/dev/null || true
            HOSTNAME=0.0.0.0 PORT=3001 pm2 start npm --name "nextjs-app2" -- run start
            pm2 save
          EOF

